services:
  - type: web
    name: northstar-demo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NORTHSTAR_SESSION_SECRET
        sync: false
      - key: NORTHSTAR_FERNET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: northstar-db
          property: connectionString
    healthCheckPath: /ping

  - type: cron
    name: northstar-keepalive
    runtime: python
    schedule: "*/10 * * * *"
    buildCommand: pip install requests
    startCommand: python -c "import requests; r = requests.get('https://northstar-demo.onrender.com/ping', timeout=10); print(r.json())"

databases:
  - name: northstar-db
    plan: free
    databaseName: northstar
    user: northstar
